# This workflow generates a FEATURE TEST PACKAGE from the latest Commit SHA.
# It only serves to validate the deployment and packageability of the latest commit.
# It does NOT affect the version of the package and is not included in the package ancestry.
# To generate a new Beta Package Version, you need to run the `Beta (Unlocked) - Create` workflow.

name: Feature - Test (Unlocked)

on:
  pull_request:
    branches:
      - feature/**
      - main

jobs:
  feature-test:
    # Run scratch-org Apex tests on every PR targeting main or feature/**.
    # Previous head_ref filter (`startsWith(github.head_ref, 'feature/')`)
    # silently skipped this job on any branch prefixed `fix/`, `feat/`,
    # `refactor/`, `chore/`, `test/`, etc. — meaning Apex changes could merge
    # without ever running real tests in a scratch org. Removed 2026-04-06.
    uses: nimba-actions/standard-workflows/.github/workflows/feature-namespaced.yml@main
    secrets:
      dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
      # cci-token: ${{ secrets.CUMULUSCI_TOKEN }}
    with:
      cumulusci-version: "3.90.0"
      sfdx-version: "7.209.6"

  field-naming-validator:
    # Enforces docs/FIELD_NAMING.md — every custom field's API name suffix must
    # match its SObject type. PMD does not cover this, so we bring our own.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate field naming conventions
        run: python scripts/validate-field-naming.py

  apex-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Use Node.js 20.x
        uses: actions/setup-node@v3
        with:
          node-version: "20.x"

      - name: Install Salesforce CLI and Scanner
        run: |
          npm install @salesforce/cli -g
          sf plugins install @salesforce/sfdx-scanner@latest

      - name: Run SFDX Scanner - Report findings as comments
        uses: mitchspano/sfdx-scan-pull-request@v0.1.16
        with:
          pmdconfig: pmd-rules.xml
          severity-threshold: 4
          engine: pmd
          strictly-enforced-rules: '[{ "engine": "pmd", "category": "Performance", "rule": "AvoidDebugStatements" }]'
          report-mode: comments
          delete-resolved-comments: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
