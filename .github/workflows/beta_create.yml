# This workflow generates a new Beta Package Version and installs it into a Validation Org.
# It also generates a corresponding Github Release and Tag.
# Beta Package Versions can only be installed into scratch orgs and sandboxes.
# To enable it for production installation you need to run the `Beta (Unlocked) - Promote` workflow.

name: Beta - Create (Unlocked)
on:
  workflow_dispatch:
  push:
    branches:
      - "main"
    # Only generate a new package if the contents of the following directories have been changed.
    paths:
      - "force-app/**"
      - "unpackaged/**"
      - "datasets/**"
jobs:
  upload-beta:
    uses: nimba-actions/standard-workflows/.github/workflows/beta-unlocked.yml@main
    secrets:
      cci-token: ${{ secrets.CUMULUSCI_TOKEN }}
      dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
    with:
      cumulusci-version: "3.78.0"
      sfdx-version: "7.209.6"
      org-name: "dev_namespaced"
      debug: true
  install-beta:
    needs: upload-beta
    uses: nimba-actions/standard-workflows/.github/workflows/install-beta.yml@main
    secrets:
      cci-token: ${{ secrets.CUMULUSCI_TOKEN }}
      dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
    with:
      cumulusci-version: "3.90.1"
      sfdx-version: "7.209.6"
      debug: true

  # Post-install smoke test for the freshly-uploaded 04t.
  # Catches two silent failure modes the feature-test job cannot see because
  # feature-test deploys source directly (bypasses the 04t path):
  #   1. CCI content-hash reuses a stale 04t — upload-beta prints "new version"
  #      but the package actually points at an older build missing shipped
  #      source changes (cost us ~4 hours on 2026-04-22).
  #   2. Restricted-picklist propagation quirk — new picklist values don't
  #      merge to subscriber orgs on upgrade. We use restricted=false to dodge
  #      it at DML time, but describe-time mismatches still indicate a stale 04t.
  # Runs in parallel with install-beta (not gated on it) so it delivers signal
  # even when install-beta's known DeliveryHubSite flake fails.
  smoke-test-beta-picklists:
    name: "Smoke Test Beta 04t: Picklist Propagation"
    needs: upload-beta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set Up CumulusCI
        uses: nimba-actions/setup-cumulus@main
        with:
          cumulusci-version: "3.90.1"
          sfdx-version: "7.209.6"

      - name: Authorize Dev Hub
        uses: nimba-actions/authorize-org@main
        with:
          auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
          org-name: dev-hub
          dev-hub: true

      - name: Install Latest Beta (ci_beta flow) on Fresh Scratch
        # CCI requires the github service as a JSON blob (username + token + email),
        # not a bare token. Mirror the env-block from nimba-actions/run-flow so this
        # job authenticates the same way `install-beta` does. `github.token` is the
        # auto-generated GITHUB_TOKEN — always available, no extra secret config.
        env:
          CUMULUSCI_SERVICE_github: '{"username": "${{ github.actor }}", "token": "${{ secrets.CUMULUSCI_TOKEN || github.token }}", "email": "cci@github.actions" }'
        run: |
          cci flow run ci_beta --org beta

      - name: Resolve Scratch Org Username
        id: scratch
        run: |
          SCRATCH_USERNAME=$(cci org info beta --json | python -c "import json,sys; print(json.load(sys.stdin)['username'])")
          echo "username=$SCRATCH_USERNAME" >> "$GITHUB_OUTPUT"
          echo "Resolved scratch username: $SCRATCH_USERNAME"

      - name: Smoke Test — Picklist Values Present on Subscriber Describe
        run: |
          python scripts/ci/smoke_picklist_propagation.py \
            --target-org "${{ steps.scratch.outputs.username }}"

      - name: Delete Scratch Org
        if: always()
        run: |
          cci org scratch_delete beta || true

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
