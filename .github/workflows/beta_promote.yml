# This workflow promotes the latest Beta Package Version.
# It does *not* deliver the promoted package to any org.
# To deliver a Promoted Release to an Org, you need to run the `Package Install` workflow.

name: Beta - Promote (Unlocked)

on:
  workflow_dispatch:
    inputs:
      version_id:
        description: 'Optional 04t Package Version Id to promote. Leave blank to auto-resolve to latest beta. Use this when the auto-resolver picks the wrong version (e.g. picks an already-promoted beta after a partial-failure run).'
        required: false
        type: string

jobs:
  upload-prod:
    uses: nimba-actions/standard-workflows/.github/workflows/production-unlocked.yml@main
    secrets:
      cci-token: ${{ secrets.CUMULUSCI_TOKEN }}
      dev-hub-auth-url: ${{ secrets.DEV_HUB_AUTH_URL }}
    with:
      cumulusci-version: "3.78.0"
      beta-version: ${{ inputs.version_id }}

permissions:
  actions: write
  attestations: write
  checks: write
  contents: write
  deployments: write
  discussions: write
  issues: write
  packages: write
  pages: write
  pull-requests: write
  repository-projects: write
  security-events: write
  statuses: write
