<template>
    <lightning-card title="Sync Health" icon-name="utility:sync">
        <div slot="actions" class="slds-grid slds-grid_vertical-align-center" style="gap: 0.25rem;">
            <c-delivery-info-popover component-name="deliverySyncRetryPanel"></c-delivery-info-popover>
            <lightning-button
                label={toggleLabel}
                variant="neutral"
                size="small"
                onclick={handleToggleDismissed}>
            </lightning-button>
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                onclick={handleRefresh}
                alternative-text="Refresh">
            </lightning-button-icon>
        </div>

        <template lwc:if={isLoading}>
            <div class="slds-p-medium slds-text-align_center">
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
        </template>

        <template lwc:else>
            <div class="slds-p-horizontal_medium slds-p-bottom_medium">

                <!-- Health summary row -->
                <div class="srp-summary">
                    <template lwc:if={hasFailures}>
                        <div class="srp-badge srp-badge--error">
                            <lightning-icon icon-name="utility:error" size="x-small" class="srp-badge-icon"></lightning-icon>
                            <span>{failedCount} failed sync{pluralSuffix}</span>
                        </div>
                        <lightning-button
                            label="Retry All"
                            variant="destructive-text"
                            size="small"
                            onclick={handleRetry}
                            disabled={isRetrying}
                            class="srp-retry-btn">
                        </lightning-button>
                        <lightning-button
                            label="Dismiss All Shown"
                            variant="neutral"
                            size="small"
                            onclick={handleDismissAll}
                            class="srp-dismiss-btn">
                        </lightning-button>
                    </template>
                    <template lwc:else>
                        <div class="srp-badge srp-badge--ok">
                            <lightning-icon icon-name="utility:check" size="x-small" class="srp-badge-icon"></lightning-icon>
                            <span>All syncs healthy</span>
                        </div>
                    </template>
                </div>

                <!-- Staged-awaiting-poll info row (separate from failures) -->
                <template lwc:if={hasStaged}>
                    <div class="slds-text-body_small slds-text-color_weak slds-p-top_xx-small">
                        <lightning-icon icon-name="utility:clock" size="xx-small" class="slds-m-right_xx-small"></lightning-icon>
                        {stagedAwaitingPoll} item{stagedPluralSuffix} waiting for downstream client to poll (Poll Mode — not failures)
                    </div>
                </template>

                <!-- Recent errors table -->
                <template lwc:if={hasErrors}>
                    <table class="srp-table">
                        <thead>
                            <tr>
                                <th>Object</th>
                                <th>Error</th>
                                <th>Time</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={recentErrors} for:item="err">
                                <tr key={err.id}>
                                    <td class="srp-obj">{err.objectType}</td>
                                    <td class="srp-err">{err.errorLog}</td>
                                    <td class="srp-time">{err.lastModified}</td>
                                    <td class="srp-action">
                                        <template lwc:if={err.dismissed}>
                                            <lightning-button
                                                label="Restore"
                                                variant="base"
                                                data-id={err.id}
                                                onclick={handleRestoreOne}>
                                            </lightning-button>
                                        </template>
                                        <template lwc:else>
                                            <lightning-button
                                                label="Dismiss"
                                                variant="base"
                                                data-id={err.id}
                                                onclick={handleDismissOne}>
                                            </lightning-button>
                                        </template>
                                    </td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </template>

            </div>
        </template>
    </lightning-card>
</template>
