<template>
    <!-- Backdrop -->
    <div class="modal-backdrop" onclick={handleClose}></div>

    <!-- Modal -->
    <div class="modal-container" role="dialog" aria-modal="true" aria-label="Edit Work Item">

        <!-- Header -->
        <header class="modal-header">
            <h2 class="modal-title">Edit Work Item</h2>
            <div class="modal-header-actions">
                <lightning-button-icon
                    icon-name="utility:new_window"
                    alternative-text="View full record"
                    title="View full record"
                    variant="bare"
                    onclick={handleNavigate}
                ></lightning-button-icon>
                <lightning-button-icon
                    icon-name="utility:close"
                    alternative-text="Close"
                    title="Close"
                    variant="bare"
                    onclick={handleClose}
                ></lightning-button-icon>
            </div>
        </header>

        <!-- Body -->
        <div class="modal-body">
            <lightning-record-edit-form
                object-api-name={objectApiName}
                record-id={recordId}
                onsuccess={handleSuccess}
                onerror={handleError}
            >
                <!-- Primary fields -->
                <div class="field-grid">
                    <div class="field-full">
                        <lightning-input-field field-name="%%%NAMESPACED_ORG%%%BriefDescriptionTxt__c" variant="label-stacked"></lightning-input-field>
                    </div>
                    <lightning-input-field field-name="%%%NAMESPACED_ORG%%%StageNamePk__c" variant="label-stacked"></lightning-input-field>
                    <lightning-input-field field-name="%%%NAMESPACED_ORG%%%PriorityPk__c" variant="label-stacked"></lightning-input-field>
                    <lightning-input-field field-name="%%%NAMESPACED_ORG%%%EstimatedStartDevDate__c" variant="label-stacked"></lightning-input-field>
                    <lightning-input-field field-name="%%%NAMESPACED_ORG%%%EstimatedEndDevDate__c" variant="label-stacked"></lightning-input-field>
                    <lightning-input-field field-name="%%%NAMESPACED_ORG%%%EstimatedHoursNumber__c" variant="label-stacked"></lightning-input-field>
                    <lightning-input-field field-name="%%%NAMESPACED_ORG%%%Developer__c" variant="label-stacked"></lightning-input-field>
                </div>

                <!-- Advanced toggle -->
                <button type="button" class="advanced-toggle" onclick={handleToggleAdvanced}>
                    <lightning-icon icon-name={advancedToggleIcon} size="xx-small" alternative-text="Toggle"></lightning-icon>
                    <span>{advancedToggleLabel}</span>
                </button>

                <!-- Advanced fields -->
                <template lwc:if={showAdvanced}>
                    <div class="advanced-fields">
                        <div class="field-grid">
                            <lightning-input-field field-name="%%%NAMESPACED_ORG%%%Tags__c" variant="label-stacked"></lightning-input-field>
                            <lightning-input-field field-name="%%%NAMESPACED_ORG%%%Epic__c" variant="label-stacked"></lightning-input-field>
                            <lightning-input-field field-name="%%%NAMESPACED_ORG%%%SortOrderNumber__c" variant="label-stacked"></lightning-input-field>
                            <lightning-input-field field-name="%%%NAMESPACED_ORG%%%ProjectedUATReadyDate__c" variant="label-stacked"></lightning-input-field>
                        </div>
                    </div>
                </template>

                <!-- Footer -->
                <footer class="modal-footer">
                    <lightning-button variant="neutral" label="Cancel" onclick={handleClose}></lightning-button>
                    <lightning-button variant="brand" type="submit" label="Save"></lightning-button>
                </footer>
            </lightning-record-edit-form>
        </div>
    </div>
</template>
