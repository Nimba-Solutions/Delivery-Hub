<template>
    <div class="timeline-card">
        <!-- Shared toolbar -->
        <c-delivery-gantt-toolbar
            title={toolbarTitle}
            subtitle={toolbarSubtitle}
            zoom-levels="Week,Month,Quarter"
            current-zoom={zoomLevel}
            entity-options={workflowTypeOptions}
            selected-entity={selectedWorkflowType}
            show-dependency-toggle
            dependencies-active={showDependencies}
            show-my-work-toggle
            my-work-active={myWorkOnly}
            onzoomchange={handleZoomChange}
            onentitychange={handleEntityChange}
            ontoggledependencies={handleToggleDependencies}
            ontogglemywork={handleToggleMyWork}
            onscrolltoday={handleScrollToday}
            onrefresh={handleRefresh}
        ></c-delivery-gantt-toolbar>

        <!-- Summary stats bar -->
        <template if:true={hasStats}>
            <div class="stats-bar">
                <div class="stat-item">
                    <span class="stat-value">{totalItemCount}</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-item stat-on-track">
                    <span class="stat-value">{onTrackCount}</span>
                    <span class="stat-label">On Track</span>
                </div>
                <div class="stat-item stat-overdue">
                    <span class="stat-value">{overdueCount}</span>
                    <span class="stat-label">Overdue</span>
                </div>
                <div class="stat-item stat-unscheduled">
                    <span class="stat-value">{unscheduledCount}</span>
                    <span class="stat-label">Unscheduled</span>
                </div>
            </div>
        </template>

        <!-- Loading state -->
        <template if:true={isLoading}>
            <div class="loading-container">
                <lightning-spinner alternative-text="Loading timeline" size="medium"></lightning-spinner>
            </div>
        </template>

        <!-- Empty state -->
        <template if:true={isEmpty}>
            <div class="slds-align_absolute-center slds-p-around_large empty-state">
                <div class="slds-text-align_center">
                    <lightning-icon icon-name="utility:date_input" size="large" class="slds-m-bottom_small"></lightning-icon>
                    <p class="slds-text-heading_small slds-m-top_small">No work items to display</p>
                    <p class="slds-text-body_regular slds-text-color_weak">
                        Active work items with dates will appear here as timeline bars.
                    </p>
                </div>
            </div>
        </template>

        <!-- Timeline grid -->
        <template if:false={isLoading}>
            <template if:false={isEmpty}>
                <!-- Stage color legend -->
                <template if:true={hasLegendItems}>
                    <div class="legend-bar">
                        <template for:each={legendItems} for:item="legendItem">
                            <div key={legendItem.stage} class="legend-item">
                                <span class="legend-swatch" style={legendItem.swatchStyle}></span>
                                <span class="legend-label">{legendItem.stage}</span>
                            </div>
                        </template>
                    </div>
                </template>

                <div class="timeline-container" lwc:ref="timelineContainer">
                    <!-- Header row with date columns -->
                    <div class="timeline-header" style={gridTemplateStyle}>
                        <div class="entity-label-header">Entity</div>
                        <div class="date-columns-row">
                            <template for:each={dateColumns} for:item="col">
                                <div key={col.key} class={col.cssClass} style={col.style}>
                                    {col.label}
                                </div>
                            </template>
                        </div>
                    </div>

                    <!-- Body rows grouped by entity -->
                    <template for:each={entityGroups} for:item="group">
                        <div key={group.entityKey} class="entity-row" style={gridTemplateStyle}>
                            <!-- Entity label -->
                            <div class="entity-row-header" style={group.rowStyle}>
                                {group.entityName}
                            </div>
                            <!-- Bar container -->
                            <div class="entity-row-body" style={group.bodyStyle}>
                                <!-- Today line with label -->
                                <div class="today-marker" style={todayLineInBodyStyle}>
                                    <div class="today-marker-label">Today</div>
                                    <div class="today-marker-line"></div>
                                </div>
                                <template for:each={group.items} for:item="item">
                                    <div
                                        key={item.workItemId}
                                        class="timeline-bar"
                                        style={item.barStyle}
                                        title={item.tooltipText}
                                        data-id={item.workItemId}
                                        data-startdate={item.startDate}
                                        data-enddate={item.endDate}
                                        onclick={handleBarClick}
                                        onmousedown={handleBarMouseDown}
                                    >
                                        <span class="bar-label">{item.name}</span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <!-- Dependency arrows SVG overlay -->
                    <template if:true={showDependencies}>
                        <template if:true={hasDependencyArrows}>
                            <svg class="dependency-svg"
                                 xmlns="http://www.w3.org/2000/svg"
                                 viewBox={svgViewBox}
                                 width={svgWidth}
                                 height={svgHeight}
                            >
                                <template for:each={dependencyArrows} for:item="arrow">
                                    <g key={arrow.key}>
                                        <path d={arrow.pathD} class="dep-path"></path>
                                        <path d={arrow.arrowD} class="dep-arrowhead"></path>
                                    </g>
                                </template>
                            </svg>
                        </template>
                    </template>
                </div>

                <!-- Unscheduled items section -->
                <template if:true={hasUnscheduledItems}>
                    <div class="unscheduled-section">
                        <div class="unscheduled-header">
                            <lightning-icon icon-name="utility:warning" size="x-small" class="unscheduled-icon"></lightning-icon>
                            <span class="unscheduled-title">Unscheduled ({unscheduledCount})</span>
                            <span class="unscheduled-subtitle">Items missing start or end dates</span>
                        </div>
                        <div class="unscheduled-items">
                            <template for:each={unscheduledItems} for:item="usItem">
                                <button
                                    key={usItem.workItemId}
                                    class="unscheduled-item"
                                    data-id={usItem.workItemId}
                                    onclick={handleBarClick}
                                    title={usItem.tooltipText}
                                >
                                    <span class="unscheduled-swatch" style={usItem.swatchStyle}></span>
                                    <span class="unscheduled-name">{usItem.name}</span>
                                    <template if:true={usItem.description}>
                                        <span class="unscheduled-desc">&mdash; {usItem.description}</span>
                                    </template>
                                    <span class="unscheduled-stage">{usItem.stage}</span>
                                </button>
                            </template>
                        </div>
                    </div>
                </template>
            </template>
        </template>
    </div>

    <!-- Quick-edit modal -->
    <template if:true={showQuickEdit}>
        <c-delivery-gantt-quick-edit
            record-id={selectedWorkItemId}
            onsave={handleQuickEditSave}
            onclose={handleQuickEditClose}
        ></c-delivery-gantt-quick-edit>
    </template>
</template>
