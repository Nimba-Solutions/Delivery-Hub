<template>
    <div class="settings-card">
        <div class="card-header">
            <div class="header-content">
                <div class="header-icon">
                    <lightning-icon icon-name="utility:settings" alternative-text="General Settings" size="small"></lightning-icon>
                </div>
                <div class="header-text">
                    <h2 class="card-title">General Settings</h2>
                    <p class="card-subtitle">Configure general application preferences and behavior</p>
                </div>
            </div>
        </div>

        <div class="card-body">

            <div class="form-section">
                <div class="toggle-group">
                    <div class="toggle-content">
                        <div class="toggle-label-wrapper">
                            <lightning-icon icon-name="utility:notification" alternative-text="Notifications" size="x-small"></lightning-icon>
                            <label class="toggle-label">Enable Notifications</label>
                        </div>
                        <div class="toggle-help">
                            Receive notifications for work item updates and system events
                        </div>
                        <template lwc:if={notificationsActivatedAt}>
                            <p class="slds-text-body_small slds-text-color_success slds-m-top_xx-small">Active since {notificationsActivatedAt}</p>
                        </template>
                    </div>
                    <div class="toggle-control">
                        <div class="custom-toggle">
                            <lightning-input
                                type="toggle"
                                checked={notifications}
                                onchange={handleNotificationsToggle}>
                            </lightning-input>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="form-section">
                <div class="toggle-group">
                    <div class="toggle-content">
                        <div class="toggle-label-wrapper">
                            <lightning-icon icon-name="utility:connected_apps" alternative-text="Sync" size="x-small"></lightning-icon>
                            <label class="toggle-label">Auto-Sync Network Entity</label>
                        </div>
                        <div class="toggle-help">
                            Automatically create a Request when a Work Item is created if only one active Vendor exists.
                        </div>
                        <template lwc:if={autoSyncActivatedAt}>
                            <p class="slds-text-body_small slds-text-color_success slds-m-top_xx-small">Active since {autoSyncActivatedAt}</p>
                        </template>
                    </div>
                    <div class="toggle-control">
                        <div class="custom-toggle">
                            <lightning-input
                                type="toggle"
                                checked={autoSyncNetworkEntity}
                                onchange={handleAutoSyncToggle}>
                            </lightning-input>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="form-section">
                <div class="toggle-group">
                    <div class="toggle-content">
                        <div class="toggle-label-wrapper">
                            <lightning-icon icon-name="utility:email" alternative-text="Email" size="x-small"></lightning-icon>
                            <label class="toggle-label">Email Notifications</label>
                        </div>
                        <div class="toggle-help">
                            Send email notifications to assigned developers and record owners when work items change stage.
                        </div>
                        <template lwc:if={emailNotificationsActivatedAt}>
                            <p class="slds-text-body_small slds-text-color_success slds-m-top_xx-small">Active since {emailNotificationsActivatedAt}</p>
                        </template>
                    </div>
                    <div class="toggle-control">
                        <div class="custom-toggle">
                            <lightning-input
                                type="toggle"
                                checked={emailNotificationsEnabled}
                                onchange={handleEmailNotificationsToggle}>
                            </lightning-input>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="form-section">
                <div class="toggle-group">
                    <div class="toggle-content">
                        <div class="toggle-label-wrapper">
                            <lightning-icon icon-name="utility:metrics" alternative-text="Board Metrics" size="x-small"></lightning-icon>
                            <label class="toggle-label">Show Board Metrics</label>
                        </div>
                        <div class="toggle-help">
                            Display the inline metrics bar (active count, cycle time, blocked items) at the top of the Kanban board.
                        </div>
                        <template lwc:if={boardMetricsActivatedAt}>
                            <p class="slds-text-body_small slds-text-color_success slds-m-top_xx-small">Active since {boardMetricsActivatedAt}</p>
                        </template>
                    </div>
                    <div class="toggle-control">
                        <div class="custom-toggle">
                            <lightning-input
                                type="toggle"
                                checked={showBoardMetrics}
                                onchange={handleBoardMetricsToggle}>
                            </lightning-input>
                        </div>
                    </div>
                </div>
            </div>

            <div class="section-divider"></div>

            <div class="form-section">
                <div class="slack-group">
                    <div class="toggle-label-wrapper" style="margin-bottom: 0.5rem;">
                        <lightning-icon icon-name="utility:chat" alternative-text="Slack" size="x-small"></lightning-icon>
                        <label class="toggle-label">Slack Notifications</label>
                    </div>
                    <p class="toggle-help" style="margin-bottom: 0.75rem;">
                        Post stage-change alerts to a Slack channel using an Incoming Webhook.
                        Leave blank to disable.
                    </p>
                    <div class="slack-input-row">
                        <lightning-input
                            type="text"
                            label="Webhook URL"
                            placeholder="https://hooks.slack.com/services/..."
                            value={slackWebhookUrl}
                            onchange={handleSlackUrlChange}
                            onblur={handleSlackUrlSave}
                            class="slack-url-input">
                        </lightning-input>
                        <lightning-button
                            label={slackTestLabel}
                            variant="neutral"
                            onclick={handleSlackTest}
                            disabled={isSlackTesting}
                            class="slack-test-btn">
                        </lightning-button>
                    </div>
                    <template lwc:if={slackTestResult}>
                        <div class={slackResultClass}>
                            {slackTestResult}
                        </div>
                    </template>
                </div>
            </div>

            <div class="section-divider"></div>

            <!-- Advanced Configuration -->
            <div class="form-section">
                <div class="toggle-label-wrapper" style="margin-bottom: 0.75rem;">
                    <lightning-icon icon-name="utility:advanced_function" alternative-text="Advanced" size="x-small"></lightning-icon>
                    <label class="toggle-label">Advanced Configuration</label>
                </div>

                <div class="slds-grid slds-wrap slds-gutters_small">
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <lightning-input
                            type="number"
                            label="Reconciliation Hour (0-23)"
                            value={reconciliationHour}
                            min="0"
                            max="23"
                            step="1"
                            onchange={handleReconciliationHourChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <lightning-input
                            type="number"
                            label="Sync Retry Limit (1-10)"
                            value={syncRetryLimit}
                            min="1"
                            max="10"
                            step="1"
                            onchange={handleSyncRetryLimitChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <lightning-input
                            type="number"
                            label="Activity Log Retention Days (30-365)"
                            value={activityLogRetentionDays}
                            min="30"
                            max="365"
                            step="1"
                            onchange={handleActivityLogRetentionChange}>
                        </lightning-input>
                    </div>
                    <div class="slds-col slds-size_1-of-2 slds-p-bottom_small">
                        <lightning-input
                            type="number"
                            label="Escalation Cooldown Hours (1-168)"
                            value={escalationCooldownHours}
                            min="1"
                            max="168"
                            step="1"
                            onchange={handleEscalationCooldownChange}>
                        </lightning-input>
                    </div>
                </div>
            </div>

        </div>
    </div>
</template>
