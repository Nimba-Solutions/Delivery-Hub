<template>
    <template lwc:if={hasActions}>
        <div class="signature-block">
            <h3 class="signature-block-title">{title}</h3>
            <div class="signature-block-grid">
                <template for:each={sortedActions} for:item="action">
                    <div key={action.id} class={action.slotClass}>
                        <p class="signature-slot-label">{action.label}</p>
                        <template lwc:if={action.isCompleted}>
                            <template lwc:if={action.isImageSignature}>
                                <img class="signature-slot-image" src={action.signatureImageUrl} alt="Drawn signature"/>
                            </template>
                            <template lwc:if={action.isTextSignature}>
                                <p class="signature-slot-stamp">{action.signatureData}</p>
                            </template>
                            <template lwc:if={action.signerName}>
                                <p class="signature-slot-meta">{action.signerName}</p>
                            </template>
                        </template>
                        <template lwc:else>
                            <p class="signature-slot-empty">— Awaiting signature —</p>
                            <template lwc:if={action.showSignButton}>
                                <lightning-button
                                    label={action.label}
                                    variant="brand"
                                    data-action-id={action.id}
                                    onclick={handleSignClick}
                                    class="slds-m-top_small"
                                ></lightning-button>
                            </template>
                            <template lwc:if={action.showCopyLink}>
                                <lightning-button
                                    label="Copy Signer Link"
                                    icon-name="utility:copy_to_clipboard"
                                    variant="neutral"
                                    data-action-id={action.id}
                                    onclick={handleCopyLinkClick}
                                    class="slds-m-top_x-small"
                                ></lightning-button>
                            </template>
                        </template>
                    </div>
                </template>
            </div>

            <!-- Phase 4: Audit trail (admin-only) -->
            <template lwc:if={hasAuditTrail}>
                <div class="audit-trail">
                    <div class="audit-trail-header">
                        <lightning-icon icon-name="utility:lock" size="x-small" class="slds-m-right_x-small"></lightning-icon>
                        <h4 class="audit-trail-title">Tamper-Evident Audit Trail</h4>
                    </div>
                    <div class="audit-trail-meta">
                        <div class="audit-trail-meta-item">
                            <span class="audit-trail-meta-label">Document Hash</span>
                            <code class="audit-trail-hash">{documentHashShort}</code>
                        </div>
                        <div class="audit-trail-meta-item">
                            <span class="audit-trail-meta-label">Chain Head</span>
                            <code class="audit-trail-hash">{chainHeadShort}</code>
                        </div>
                    </div>
                    <table class="audit-trail-table">
                        <thead>
                            <tr>
                                <th>Slot</th>
                                <th>Signer</th>
                                <th>Signed At</th>
                                <th>IP</th>
                                <th>User Agent</th>
                                <th>Chain Hash</th>
                            </tr>
                        </thead>
                        <tbody>
                            <template for:each={auditRows} for:item="row">
                                <tr key={row.key}>
                                    <td>{row.slotLabel}</td>
                                    <td>
                                        <div>{row.signerName}</div>
                                        <div class="audit-trail-subtle">{row.signerEmail}</div>
                                    </td>
                                    <td>{row.signedAt}</td>
                                    <td><code class="audit-trail-mono">{row.ipAddress}</code></td>
                                    <td class="audit-trail-subtle">{row.userAgentShort}</td>
                                    <td><code class="audit-trail-hash">{row.priorHashShort}</code></td>
                                </tr>
                            </template>
                        </tbody>
                    </table>
                </div>
            </template>
        </div>
    </template>

    <!-- Sign Modal -->
    <template lwc:if={showSignModal}>
        <section role="dialog" tabindex="-1" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        alternative-text="Close"
                        variant="bare-inverse"
                        class="slds-modal__close"
                        onclick={handleCancelModal}
                    ></lightning-button-icon>
                    <h2 class="slds-text-heading_medium">{modalHeading}</h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <lightning-input
                        type="text"
                        label="Your Full Name"
                        value={formName}
                        onchange={handleNameChange}
                        required
                        max-length="255"
                    ></lightning-input>
                    <lightning-input
                        type="email"
                        label="Your Email"
                        value={formEmail}
                        onchange={handleEmailChange}
                        class="slds-m-top_small"
                    ></lightning-input>

                    <!-- Phase 5: drawn-signature toggle + pad -->
                    <lightning-input
                        type="toggle"
                        label="Draw my signature instead"
                        message-toggle-active="Drawing"
                        message-toggle-inactive="Type stamp"
                        checked={useDrawnSignature}
                        onchange={handleDrawToggle}
                        class="slds-m-top_medium"
                    ></lightning-input>
                    <template lwc:if={useDrawnSignature}>
                        <div class="slds-m-top_small">
                            <c-delivery-signature-pad
                                label="Sign in the box below"
                                onsignaturechange={handleSignaturePadChange}
                            ></c-delivery-signature-pad>
                        </div>
                    </template>

                    <div class="consent-disclosure slds-m-top_medium">
                        <p class="slds-text-body_small consent-text">{consentDisclosure}</p>
                        <lightning-input
                            type="checkbox"
                            label="I agree to sign this document electronically."
                            checked={formConsent}
                            onchange={handleConsentChange}
                            class="slds-m-top_x-small"
                            required
                        ></lightning-input>
                    </div>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        variant="neutral"
                        onclick={handleCancelModal}
                    ></lightning-button>
                    <lightning-button
                        label="Sign Document"
                        variant="brand"
                        onclick={handleSubmitSign}
                        disabled={isSubmitDisabled}
                        class="slds-m-left_x-small"
                    ></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
