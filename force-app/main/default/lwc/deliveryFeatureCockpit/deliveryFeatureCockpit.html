<template>
    <lightning-card title="Feature Cockpit" icon-name="standard:apps">

        <div slot="actions">
            <lightning-button
                label="Request approval to toggle"
                icon-name="utility:approval"
                variant="neutral"
                onclick={handleOpenApprovalSubmit}
                class="slds-m-right_x-small">
            </lightning-button>
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                onclick={handleRefresh}
                alternative-text="Refresh Feature Catalog">
            </lightning-button-icon>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <template lwc:if={hasError}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning" role="alert">
                    <span class="slds-assistive-text">warning</span>
                    <h2>{errorMessage}</h2>
                </div>
            </template>

            <template lwc:if={isEmpty}>
                <div class="slds-illustration slds-illustration_small slds-p-vertical_medium">
                    <div class="slds-text-longform slds-text-align_center">
                        <p class="slds-text-body_regular slds-text-color_weak">
                            No features defined yet. Install the package or seed FeatureDefinition__mdt records to populate this catalog.
                        </p>
                    </div>
                </div>
            </template>

            <template lwc:if={hasFeatures}>
                <div class="slds-grid slds-wrap slds-gutters_small feature-grid">
                    <template for:each={features} for:item="feature">
                        <div key={feature.key} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2 slds-large-size_1-of-3 slds-p-bottom_small">
                            <article class="slds-card slds-card_boundary slds-box slds-box_x-small feature-card">

                                <header class="slds-grid slds-grid_vertical-align-center slds-m-bottom_x-small">
                                    <div class="slds-media__figure slds-m-right_small">
                                        <lightning-icon icon-name={feature.icon} size="medium" alternative-text={feature.label}></lightning-icon>
                                    </div>
                                    <div class="slds-media__body">
                                        <h3 class="slds-text-heading_small slds-truncate" title={feature.label}>
                                            <strong>{feature.label}</strong>
                                        </h3>
                                        <div class="slds-grid slds-gutters_xx-small slds-m-top_xx-small">
                                            <span class={feature.categoryBadgeClass}>{feature.category}</span>
                                            <span class={feature.maturityBadgeClass}>{feature.maturity}</span>
                                            <span class={feature.statusBadgeClass}>{feature.statusBadgeText}</span>
                                        </div>
                                    </div>
                                </header>

                                <div class="slds-text-body_small slds-text-color_weak slds-m-bottom_small feature-description" title={feature.description}>
                                    {feature.truncatedDescription}
                                </div>

                                <footer class="slds-grid slds-grid_align-spread slds-grid_vertical-align-center">
                                    <template lwc:if={feature.hasSettingsField}>
                                        <div class="slds-text-body_small slds-text-color_weak slds-truncate" title={feature.settingsFieldApiName}>
                                            Mapped to: <code>{feature.settingsFieldApiName}</code>
                                        </div>
                                    </template>
                                    <template lwc:if={feature.hasDocsUrl}>
                                        <a href={feature.docsUrl} target="_blank" rel="noopener noreferrer" class="slds-text-body_small">
                                            View Docs
                                        </a>
                                    </template>
                                </footer>

                                <template lwc:if={canToggle}>
                                    <div class="slds-m-top_small">
                                        <lightning-button
                                            label={feature.toggleLabel}
                                            variant={feature.toggleVariant}
                                            data-feature-id={feature.featureId}
                                            data-feature-name={feature.name}
                                            data-is-active={feature.isActive}
                                            disabled={feature.toggleDisabled}
                                            onclick={handleToggle}>
                                        </lightning-button>
                                    </div>
                                </template>

                                <template lwc:if={feature.hasFeatureId}>
                                    <div class="slds-m-top_x-small">
                                        <lightning-button
                                            label="Show dependencies"
                                            variant="neutral"
                                            data-feature-id={feature.featureId}
                                            data-feature-label={feature.label}
                                            onclick={handleShowDependencies}>
                                        </lightning-button>
                                    </div>
                                </template>

                            </article>
                        </div>
                    </template>
                </div>
            </template>

        </div>
    </lightning-card>

    <template lwc:if={isApprovalSubmitModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true"
                 aria-labelledby="approval-submit-modal-title"
                 class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close" onclick={handleCloseApprovalSubmit}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="approval-submit-modal-title" class="slds-modal__title slds-hyphenate">
                        Request feature toggle
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-delivery-feature-approval-submit
                        onsubmitted={handleApprovalSubmitted}
                        oncancel={handleCloseApprovalSubmit}>
                    </c-delivery-feature-approval-submit>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={handleCloseApprovalSubmit}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>

    <template lwc:if={isCascadeModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true" aria-labelledby="cascade-modal-title" class="slds-modal slds-fade-in-open">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                            title="Close"
                            onclick={handleCloseCascadeModal}>
                        <lightning-icon icon-name="utility:close" alternative-text="Close" size="small" variant="inverse"></lightning-icon>
                        <span class="slds-assistive-text">Close</span>
                    </button>
                    <h2 id="cascade-modal-title" class="slds-modal__title slds-hyphenate">
                        {cascadeModalTitle}
                    </h2>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <c-delivery-feature-cascade-preview
                        feature-id={cascadeFeatureId}
                        action="Enable"
                        hide-footer-buttons
                        oncancel={handleCloseCascadeModal}
                        onconfirm={handleCloseCascadeModal}>
                    </c-delivery-feature-cascade-preview>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button label="Close" onclick={handleCloseCascadeModal}></lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
