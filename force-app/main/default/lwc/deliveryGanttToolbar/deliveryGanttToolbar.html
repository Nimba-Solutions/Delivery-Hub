<template>
    <div class="toolbar-card">
        <!-- Primary row -->
        <div class="toolbar-primary">
            <div class="toolbar-left">
                <lightning-icon icon-name="utility:date_time" size="small" class="toolbar-icon"></lightning-icon>
                <div>
                    <h2 class="toolbar-title">{title}</h2>
                    <template lwc:if={subtitle}>
                        <p class="toolbar-subtitle">{subtitle}</p>
                    </template>
                </div>
            </div>
            <div class="toolbar-right">
                <!-- Entity filter -->
                <template lwc:if={showEntityCombobox}>
                    <lightning-combobox
                        label="Client"
                        variant="label-hidden"
                        value={selectedEntity}
                        options={entityOptions}
                        onchange={handleEntityChange}
                        class="entity-filter"
                    ></lightning-combobox>
                </template>

                <!-- Zoom buttons -->
                <lightning-button-group>
                    <template for:each={zoomButtons} for:item="btn">
                        <lightning-button
                            key={btn.value}
                            label={btn.label}
                            variant={btn.variant}
                            onclick={handleZoomClick}
                        ></lightning-button>
                    </template>
                </lightning-button-group>
            </div>
        </div>

        <!-- Toggle row -->
        <div class="toolbar-toggles">
            <div class="toggle-group">
                <!-- Dependencies toggle -->
                <template lwc:if={showDependencyToggle}>
                    <lightning-button-icon
                        icon-name="utility:flow"
                        variant={depToggleVariant}
                        title={depToggleTitle}
                        alternative-text="Toggle dependencies"
                        onclick={handleToggleDependencies}
                        size="small"
                    ></lightning-button-icon>
                </template>

                <!-- Completed toggle -->
                <template lwc:if={showCompletedToggle}>
                    <lightning-button-icon
                        icon-name="utility:check"
                        variant={completedToggleVariant}
                        title={completedToggleTitle}
                        alternative-text="Toggle completed"
                        onclick={handleToggleCompleted}
                        size="small"
                    ></lightning-button-icon>
                </template>

                <!-- My Work toggle -->
                <template lwc:if={showMyWorkToggle}>
                    <lightning-button-icon
                        icon-name="utility:user"
                        variant={myWorkToggleVariant}
                        title={myWorkToggleTitle}
                        alternative-text="Toggle my work"
                        onclick={handleToggleMyWork}
                        size="small"
                    ></lightning-button-icon>
                </template>
            </div>

            <div class="toggle-group">
                <!-- Scroll to today -->
                <lightning-button-icon
                    icon-name="utility:clock"
                    variant="border"
                    title="Scroll to today"
                    alternative-text="Scroll to today"
                    onclick={handleScrollToday}
                    size="small"
                ></lightning-button-icon>

                <!-- Refresh -->
                <lightning-button-icon
                    icon-name="utility:refresh"
                    variant="border"
                    title="Refresh data"
                    alternative-text="Refresh"
                    onclick={handleRefresh}
                    size="small"
                ></lightning-button-icon>
            </div>
        </div>
    </div>
</template>
