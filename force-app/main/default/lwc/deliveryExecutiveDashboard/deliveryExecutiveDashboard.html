<template>
    <template lwc:if={isNotHiddenOnHome}>
    <lightning-card title="Executive Dashboard" icon-name="utility:metrics">
        <div slot="actions" class="slds-grid slds-grid_vertical-align-center" style="gap: 0.25rem;">
            <c-delivery-info-popover component-name="deliveryExecutiveDashboard"></c-delivery-info-popover>
            <lightning-button label="Refresh" icon-name="utility:refresh" onclick={handleRefresh} variant="neutral"></lightning-button>
        </div>

        <template lwc:if={isLoading}>
            <div class="slds-align_absolute-center slds-p-around_large">
                <lightning-spinner alternative-text="Loading dashboard" size="medium"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={error}>
            <div class="slds-p-around_medium">
                <div class="slds-notify slds-notify_alert slds-alert_error" role="alert">
                    <span>{error}</span>
                </div>
            </div>
        </template>

        <template lwc:if={hasCards}>
            <div class="slds-grid slds-wrap slds-p-around_small">
                <template for:each={cards} for:item="card">
                    <div key={card.key} class={card.sizeClass}>
                        <article class={card.cardClass} data-url={card.clickThroughUrl} onclick={handleCardClick}>
                            <header class="dh-card-header">
                                <template lwc:if={card.iconName}>
                                    <lightning-icon icon-name={card.iconName} size="x-small"></lightning-icon>
                                </template>
                                <h3 class="dh-card-title">{card.title}</h3>
                                <template lwc:if={card.hasInfoPopover}>
                                    <button
                                        type="button"
                                        class="dh-info-btn"
                                        data-key={card.key}
                                        title="About this card"
                                        onclick={handleInfoToggle}>
                                        <lightning-icon icon-name="utility:info" size="xx-small" alternative-text="Info"></lightning-icon>
                                    </button>
                                </template>
                            </header>

                            <template lwc:if={card.infoPopoverOpen}>
                                <div class="dh-info-popover">
                                    <p>{card.infoPopover}</p>
                                </div>
                            </template>

                            <!-- Metric Card -->
                            <template lwc:if={card.isMetric}>
                                <div class={card.metricClass}>{card.displayValue}</div>
                                <template lwc:if={card.description}>
                                    <p class="dh-metric-description">{card.description}</p>
                                </template>
                            </template>

                            <!-- Bar Chart Card -->
                            <template lwc:if={card.isChart}>
                                <div>
                                    <template for:each={card.chartBars} for:item="bar">
                                        <div key={bar.key} class="dh-bar-row">
                                            <span class="dh-bar-label">{bar.label}</span>
                                            <div class="dh-bar-track">
                                                <div class="dh-bar-fill" style={bar.barStyle}></div>
                                            </div>
                                            <span class="dh-bar-value">{bar.value}</span>
                                        </div>
                                    </template>
                                </div>
                            </template>

                            <!-- List Card -->
                            <template lwc:if={card.isList}>
                                <div>
                                    <template lwc:if={card.data}>
                                        <template for:each={card.data} for:item="item">
                                            <div key={item.label} class="dh-list-item">
                                                <span class="dh-list-item-label">{item.label}</span>
                                                <span class="dh-list-item-meta"> — {item.value}</span>
                                            </div>
                                        </template>
                                    </template>
                                </div>
                            </template>

                            <!-- Pills Card (per-row traffic-light scores: On-Schedule / On-Budget) -->
                            <template lwc:if={card.isPills}>
                                <div class="dh-pills-list">
                                    <template for:each={card.pills} for:item="pill">
                                        <div key={pill.key} class="dh-pill-row" data-url={pill.recordUrl} onclick={handlePillClick}>
                                            <span class="dh-pill-label" title={pill.label}>{pill.label}</span>
                                            <span class={pill.budgetPillClass} title="On-Budget (estimated ÷ logged hours)">{pill.budgetLabel}</span>
                                            <span class={pill.schedulePillClass} title="On-Schedule (days remaining vs ETA)">{pill.scheduleLabel}</span>
                                        </div>
                                    </template>
                                </div>
                            </template>
                        </article>
                    </div>
                </template>
            </div>
        </template>

        <template lwc:if={noCardsMessage}>
            <template lwc:if={isLoading}>
            </template>
            <template lwc:elseif={error}>
            </template>
            <template lwc:elseif={hasCards}>
            </template>
            <template lwc:else>
                <div class="dh-empty">
                    <p>{noCardsMessage}</p>
                </div>
            </template>
        </template>
    </lightning-card>
    </template>
</template>
