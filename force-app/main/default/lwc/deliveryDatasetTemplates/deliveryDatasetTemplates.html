<template>
    <lightning-card title={cardTitle} icon-name="standard:dataset">

        <div slot="actions">
            <lightning-button-icon
                icon-name="utility:refresh"
                variant="border-filled"
                onclick={handleRefresh}
                alternative-text="Refresh dataset templates">
            </lightning-button-icon>
        </div>

        <div class="slds-p-horizontal_medium slds-p-bottom_medium">

            <template lwc:if={hasError}>
                <div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning" role="alert">
                    <span class="slds-assistive-text">warning</span>
                    <h2>{errorMessage}</h2>
                </div>
            </template>

            <template lwc:if={isSubscriberOrg}>
                <div class="slds-box slds-theme_shade slds-text-body_small slds-m-bottom_small">
                    Dataset templates are for package developers &mdash;
                    install scratch org tooling locally (CumulusCI + sfdx)
                    to load sample data.
                </div>
            </template>

            <template lwc:if={isEmpty}>
                <div class="slds-illustration slds-illustration_small slds-p-vertical_medium">
                    <div class="slds-text-longform slds-text-align_center">
                        <p class="slds-text-body_regular slds-text-color_weak">
                            {emptyMessage}
                        </p>
                    </div>
                </div>
            </template>

            <template lwc:if={hasTemplates}>
                <ul class="slds-has-dividers_bottom-space dataset-list">
                    <template for:each={templates} for:item="t">
                        <li key={t.key} class="slds-item slds-p-vertical_x-small dataset-row">
                            <div class="slds-grid slds-grid_vertical-align-center slds-grid_align-spread">
                                <div class="slds-col">
                                    <strong>{t.name}</strong>
                                    <template lwc:if={t.hasRecordCountEstimate}>
                                        <span class="slds-badge slds-badge_lightest slds-m-left_x-small">
                                            ~{t.recordCountEstimate} records
                                        </span>
                                    </template>
                                </div>
                                <div class="slds-col slds-no-flex">
                                    <lightning-button
                                        label="Copy Load Command"
                                        variant="brand"
                                        icon-name="utility:copy"
                                        data-template-id={t.templateId}
                                        onclick={handleCopyCommand}>
                                    </lightning-button>
                                    <lightning-button
                                        label="Mark as Loaded"
                                        variant="success"
                                        icon-name="utility:check"
                                        class="slds-m-left_x-small"
                                        data-template-id={t.templateId}
                                        data-template-name={t.name}
                                        onclick={handleOpenMarkAsLoaded}>
                                    </lightning-button>
                                    <lightning-button
                                        label="Recent Loads"
                                        variant="neutral"
                                        class="slds-m-left_x-small"
                                        data-template-id={t.templateId}
                                        onclick={handleSelectTemplate}>
                                    </lightning-button>
                                </div>
                            </div>

                            <template lwc:if={t.hasDescription}>
                                <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                    {t.description}
                                </div>
                            </template>

                            <template lwc:if={t.hasApexScriptPath}>
                                <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                    Loader: <code>{t.apexScriptPath}</code>
                                </div>
                            </template>

                            <template lwc:if={t.hasLastLoadedSubline}>
                                <div class="slds-text-body_small slds-text-color_weak slds-m-top_xx-small">
                                    {t.lastLoadedSubline}
                                </div>
                            </template>
                        </li>
                    </template>
                </ul>
            </template>

            <template lwc:if={hasRecent}>
                <div class="slds-m-top_medium slds-border_top slds-p-top_small">
                    <h3 class="slds-text-title_caps slds-m-bottom_x-small">Recent Loads</h3>
                    <ul class="slds-has-dividers_bottom-space">
                        <template for:each={recent} for:item="a">
                            <li key={a.key} class="slds-item slds-p-vertical_xx-small">
                                <div class="slds-grid slds-grid_align-spread">
                                    <div class="slds-col slds-truncate">
                                        <span class="slds-text-body_small">{a.templateName}</span>
                                    </div>
                                    <div class="slds-col slds-no-flex">
                                        <span class={a.outcomeBadgeClass}>{a.outcome}</span>
                                        <lightning-formatted-date-time
                                            value={a.loadedAt}
                                            year="numeric" month="short" day="2-digit"
                                            hour="2-digit" minute="2-digit"
                                            class="slds-m-left_x-small slds-text-body_small slds-text-color_weak">
                                        </lightning-formatted-date-time>
                                    </div>
                                </div>
                            </li>
                        </template>
                    </ul>
                </div>
            </template>

        </div>
    </lightning-card>

    <template lwc:if={isMarkAsLoadedModalOpen}>
        <section role="dialog" tabindex="-1" aria-modal="true"
            aria-labelledby="markAsLoadedHeading"
            class="slds-modal slds-fade-in-open slds-modal_small">
            <div class="slds-modal__container">
                <header class="slds-modal__header">
                    <lightning-button-icon
                        icon-name="utility:close"
                        variant="bare-inverse"
                        size="large"
                        alternative-text="Cancel"
                        title="Cancel"
                        class="slds-modal__close"
                        onclick={handleCloseMarkAsLoaded}>
                    </lightning-button-icon>
                    <h2 id="markAsLoadedHeading" class="slds-modal__title slds-hyphenate">
                        Mark Dataset as Loaded
                    </h2>
                    <p class="slds-m-top_x-small slds-text-body_small slds-text-color_weak">
                        Template: <strong>{markAsLoadedTemplateName}</strong>
                    </p>
                </header>
                <div class="slds-modal__content slds-p-around_medium">
                    <p class="slds-text-body_small slds-m-bottom_small">
                        Click <em>Confirm</em> after you have finished running
                        <code>cci task run load_feature_data</code> locally.
                        A DatasetTemplateAssignment audit row will be created
                        with you as the loader, timestamped now.
                    </p>
                    <lightning-textarea
                        name="notes"
                        label="Notes (optional)"
                        max-length="1000"
                        placeholder="What dataset did you load? Any caveats?"
                        value={markAsLoadedNotes}
                        onchange={handleMarkAsLoadedNotesChange}>
                    </lightning-textarea>
                </div>
                <footer class="slds-modal__footer">
                    <lightning-button
                        label="Cancel"
                        variant="neutral"
                        onclick={handleCloseMarkAsLoaded}
                        disabled={isSubmittingMarkAsLoaded}>
                    </lightning-button>
                    <lightning-button
                        label="Confirm"
                        variant="brand"
                        class="slds-m-left_x-small"
                        onclick={handleSubmitMarkAsLoaded}
                        disabled={isSubmittingMarkAsLoaded}>
                    </lightning-button>
                </footer>
            </div>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </template>
</template>
