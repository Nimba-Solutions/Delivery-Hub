<template>
    <div class="timeline-root">

        <!-- ── Stats bar — always shown when data is loaded ── -->
        <template lwc:if={hasRows}>
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-val">{stats.items}</span>
                    <span class="stat-lbl">Active Items</span>
                </div>
                <div class="stat-sep"></div>
                <div class="stat">
                    <span class="stat-val">{stats.hoursLogged}h</span>
                    <span class="stat-lbl">Hours Logged</span>
                </div>
                <div class="stat-sep"></div>
                <div class="stat">
                    <span class="stat-val">{stats.hoursRemaining}h</span>
                    <span class="stat-lbl">Hours Remaining</span>
                </div>
                <div class="stat-sep"></div>
                <div class="stat">
                    <span class="stat-val">{stats.months}</span>
                    <span class="stat-lbl">Months Est.</span>
                </div>
            </div>
        </template>

        <!-- ── Entity filter tabs + View mode toggle ── -->
        <template lwc:if={hasRows}>
            <div class="filter-bar">
                <template for:each={entityFilters} for:item="f">
                    <button key={f.id} class="filter-chip" data-id={f.id} data-active={f.isActive} onclick={handleEntityFilter}>{f.label}</button>
                </template>

                <div class="filter-bar-spacer"></div>

                <!-- View mode toggle -->
                <div class="view-mode-group">
                    <button class="view-btn" data-mode="gantt" data-active={isGanttMode} onclick={handleViewMode}>&#9636; Gantt</button>
                    <button class="view-btn" data-mode="list" data-active={isListMode} onclick={handleViewMode}>&#9776; List</button>
                </div>
            </div>
        </template>

        <!-- ── Stage color legend row ── -->
        <template lwc:if={hasRows}>
            <div class="legend-bar">
                <template for:each={legendItems} for:item="leg">
                    <span key={leg.color} class="legend-item">
                        <span class="legend-dot" style={leg.dotStyle}></span>
                        <span class="legend-label">{leg.label}</span>
                    </span>
                </template>
            </div>
        </template>

        <!-- ── Compact toolbar (zoom + controls) ── -->
        <div class="toolbar">
            <div class="zoom-group">
                <template for:each={zoomOptions} for:item="opt">
                    <button key={opt.level} class="zoom-btn" data-zoom={opt.level}
                            data-active={opt.isActive} onclick={handleZoomChange}>{opt.label}</button>
                </template>
            </div>
            <div class="toolbar-right">
                <label class="toggle-label">
                    <input type="checkbox" checked={showCompleted} onchange={handleShowCompletedChange} class="toggle-input" />
                    <span>Completed</span>
                </label>
                <button class="refresh-btn" onclick={handleRefresh} title="Refresh">&#8635;</button>
            </div>
        </div>

        <template lwc:if={isLoading}>
            <div class="loading">Loading timeline&hellip;</div>
        </template>

        <template lwc:if={errorMessage}>
            <div class="error">{errorMessage}</div>
        </template>

        <template lwc:if={isEmpty}>
            <div class="empty">No work items to display.</div>
        </template>

        <!-- ── Gantt container — always in DOM, hidden via CSS in list mode ── -->
        <div class="gantt-container" data-mode={_viewMode} lwc:ref="ganttContainer"></div>

        <!-- ── List view ── -->
        <template lwc:if={isListMode}>
            <div class="list-container">
                <template for:each={listGroups} for:item="grp">
                    <div key={grp.id} class="list-bucket">
                        <div class="list-bucket-header" style={grp.headerStyle}>{grp.label} ({grp.items.length})</div>
                        <table class="list-table">
                            <thead>
                                <tr>
                                    <th>Item</th>
                                    <th>Stage</th>
                                    <th>Priority</th>
                                    <th>Developer</th>
                                    <th>Entity</th>
                                    <th>Hours</th>
                                    <th>Start</th>
                                    <th>End</th>
                                </tr>
                            </thead>
                            <tbody>
                                <template for:each={grp.items} for:item="item">
                                    <tr key={item.id}>
                                        <td class="list-title">{item.title}</td>
                                        <td>{item.stage}</td>
                                        <td>{item.priority}</td>
                                        <td>{item.developer}</td>
                                        <td>{item.entity}</td>
                                        <td>{item.hours}</td>
                                        <td>{item.startDate}</td>
                                        <td>{item.endDate}</td>
                                    </tr>
                                </template>
                            </tbody>
                        </table>
                    </div>
                </template>
            </div>
        </template>

        <!-- ── Floating detail panel ── -->
        <template lwc:if={hasSelectedTask}>
            <div class="detail-overlay" onclick={handleDetailClose}>
                <div class="detail-panel" onclick={stopPropagation}>
                    <div class="detail-header">
                        <span class="detail-title">{_selectedTask.title}</span>
                        <button class="detail-close" onclick={handleDetailClose}>&#x2715;</button>
                    </div>
                    <div class="detail-body">
                        <div class="detail-row">
                            <span class="detail-key">Stage</span>
                            <span class="detail-val">{_selectedTask.stage}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-key">Priority</span>
                            <span class="detail-val">{_selectedTask.priority}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-key">Developer</span>
                            <span class="detail-val">{_selectedTask.developer}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-key">Client</span>
                            <span class="detail-val">{_selectedTask.entity}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-key">Hours</span>
                            <span class="detail-val">{_selectedTask.hours}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-key">Start</span>
                            <span class="detail-val">{_selectedTask.startDate}</span>
                        </div>
                        <div class="detail-row">
                            <span class="detail-key">End</span>
                            <span class="detail-val">{_selectedTask.endDate}</span>
                        </div>
                    </div>
                    <div class="detail-footer">
                        <button class="detail-open-btn" onclick={handleDetailNavigate}>Open Record &#x2192;</button>
                    </div>
                </div>
            </div>
        </template>

    </div>
</template>
