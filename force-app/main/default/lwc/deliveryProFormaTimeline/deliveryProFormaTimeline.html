<template>
    <div class="timeline-root">

        <!-- ── Standalone toolbar (plain HTML — used on the VF no-chrome page) ── -->
        <template lwc:if={standalone}>
            <div class="toolbar toolbar--standalone">
                <div class="zoom-group">
                    <template for:each={zoomOptions} for:item="opt">
                        <button key={opt.level} class="zoom-btn" data-zoom={opt.level}
                                data-active={opt.isActive} onclick={handleZoomChange}>{opt.label}</button>
                    </template>
                </div>
                <label class="sa-toggle">
                    <input type="checkbox" checked={showCompleted} onchange={handleShowCompletedChange} />
                    Show completed
                </label>
                <button class="sa-btn" onclick={handleRefresh}>&#8635; Refresh</button>
            </div>
        </template>

        <!-- ── Standard SLDS toolbar (Lightning Experience / tab / flexipage) ── -->
        <template lwc:else>
            <div class="toolbar">
                <div class="toolbar-title">
                    <span class="title-text">Delivery Timeline</span>
                    <span class="title-subtitle">NOW · NEXT · PLANNED · PROPOSED · HOLD</span>
                </div>
                <div class="toolbar-actions">
                    <div class="zoom-group">
                        <template for:each={zoomOptions} for:item="opt">
                            <button key={opt.level} class="zoom-btn" data-zoom={opt.level}
                                    data-active={opt.isActive} onclick={handleZoomChange}>{opt.label}</button>
                        </template>
                    </div>
                    <lightning-input
                        type="toggle"
                        label="Show completed"
                        checked={showCompleted}
                        onchange={handleShowCompletedChange}
                        variant="label-hidden"
                        message-toggle-active="Showing completed"
                        message-toggle-inactive="Active only"
                    ></lightning-input>
                    <lightning-button
                        label="Refresh"
                        icon-name="utility:refresh"
                        onclick={handleRefresh}
                        variant="neutral"
                    ></lightning-button>
                </div>
            </div>
        </template>

        <template lwc:if={isLoading}>
            <div class="loading">
                <lightning-spinner alternative-text="Loading timeline"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={errorMessage}>
            <div class="error">
                <lightning-icon icon-name="utility:error" variant="error" size="small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>

        <template lwc:if={isEmpty}>
            <div class="empty">
                <lightning-icon icon-name="utility:info" size="small"></lightning-icon>
                <span>No work items to display.</span>
            </div>
        </template>

        <div class="gantt-container" lwc:ref="ganttContainer"></div>
    </div>
</template>
