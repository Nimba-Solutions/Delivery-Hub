<template>
    <div class="gantt-card">

        <!-- Header -->
        <div class="gantt-header">
            <div class="gantt-header-left">
                <lightning-icon icon-name="utility:date_time" alternative-text="Gantt Chart" size="small" class="gantt-header-icon"></lightning-icon>
                <div>
                    <h2 class="gantt-title">Delivery Gantt Chart</h2>
                    <p class="gantt-subtitle">{subtitleText}</p>
                </div>
            </div>
            <div class="gantt-header-right">
                <c-delivery-info-popover component-name="deliveryGanttChart"></c-delivery-info-popover>
                <lightning-button-group>
                    <lightning-button label="Day" variant={btnDayVariant} onclick={handleZoomDay}></lightning-button>
                    <lightning-button label="Week" variant={btnWeekVariant} onclick={handleZoomWeek}></lightning-button>
                    <lightning-button label="Month" variant={btnMonthVariant} onclick={handleZoomMonth}></lightning-button>
                    <lightning-button label="Quarter" variant={btnQuarterVariant} onclick={handleZoomQuarter}></lightning-button>
                </lightning-button-group>
                <lightning-button-icon
                    icon-name="utility:filterList"
                    alternative-text="Toggle completed items"
                    title={completedToggleTitle}
                    variant={completedToggleVariant}
                    onclick={handleToggleCompleted}
                ></lightning-button-icon>
            </div>
        </div>

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="gantt-loading">
                <lightning-spinner alternative-text="Loading Gantt chart..." size="small"></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template lwc:if={hasError}>
            <div class="gantt-error">
                <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>

        <!-- Empty state -->
        <template lwc:if={isEmpty}>
            <div class="gantt-empty">
                <lightning-icon icon-name="utility:date_time" size="medium" class="gantt-empty-icon"></lightning-icon>
                <p>No work items found to display on the Gantt chart.</p>
                <p class="gantt-empty-sub">Create work items with estimated dates to see them plotted here.</p>
            </div>
        </template>

        <!-- Gantt container — DHTMLX renders into this div -->
        <template lwc:if={hasData}>
            <div class="gantt-container" lwc:ref="ganttContainer"></div>
        </template>

        <!-- Legend -->
        <template lwc:if={hasData}>
            <div class="gantt-legend">
                <template for:each={legendItems} for:item="item">
                    <span key={item.phase} class="legend-item">
                        <span class="legend-dot" style={item.dotStyle}></span>
                        {item.phase}
                    </span>
                </template>
            </div>
        </template>

    </div>
</template>
