<template>
    <div class="gantt-card">

        <!-- Toolbar -->
        <c-delivery-gantt-toolbar
            title={toolbarTitle}
            subtitle={toolbarSubtitle}
            zoom-levels={toolbarZoomLevels}
            current-zoom={toolbarCurrentZoom}
            hide-entity-filter
            show-dependency-toggle
            dependencies-active={showDependencies}
            show-my-work-toggle
            my-work-active={myWorkOnly}
            onzoomchange={handleZoomChange}
            ontoggledependencies={handleToggleDependencies}
            ontogglemywork={handleToggleMyWork}
            onscrolltoday={handleScrollToday}
            onrefresh={handleRefresh}
        ></c-delivery-gantt-toolbar>

        <!-- Loading -->
        <template lwc:if={isLoading}>
            <div class="gantt-loading">
                <lightning-spinner alternative-text="Loading timeline..." size="small"></lightning-spinner>
            </div>
        </template>

        <!-- Error -->
        <template lwc:if={hasError}>
            <div class="gantt-error">
                <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>

        <!-- Empty state -->
        <template lwc:if={isEmpty}>
            <div class="gantt-empty">
                <lightning-icon icon-name="utility:date_time" size="medium" class="gantt-empty-icon"></lightning-icon>
                <p>No active work items with a Projected UAT date found.</p>
                <p class="gantt-empty-sub">Set a Projected UAT Ready Date on your work items to see them here.</p>
            </div>
        </template>

        <!-- Chart -->
        <template lwc:if={hasRows}>

            <!-- Summary stats bar -->
            <div class="gantt-summary-bar">
                <span class="summary-stat">
                    <span class="summary-count">{summaryStats.total}</span> Total
                </span>
                <span class="summary-stat summary-stat--on-track">
                    <span class="summary-count">{summaryStats.onTrack}</span> On Track
                </span>
                <template lwc:if={hasSummaryDueSoon}>
                    <span class="summary-stat summary-stat--warning">
                        <span class="summary-count">{summaryStats.dueSoon}</span> Due Soon
                    </span>
                </template>
                <template lwc:if={hasSummaryOverdue}>
                    <span class="summary-stat summary-stat--overdue">
                        <span class="summary-count">{summaryStats.overdue}</span> Overdue
                    </span>
                </template>
                <span class="summary-stat summary-stat--assigned">
                    <span class="summary-count">{summaryStats.assigned}</span> Assigned
                </span>
            </div>

            <div class="gantt-body">

                <!-- Date axis labels -->
                <div class="gantt-axis">
                    <div class="gantt-label-col"></div>
                    <div class="gantt-dev-col gantt-dev-header">Dev</div>
                    <div class="gantt-track-col">
                        <div class="gantt-date-row">
                            <template for:each={dateLabels} for:item="dl">
                                <span key={dl.key} class="gantt-date-label" style={dl.style}>{dl.label}</span>
                            </template>
                        </div>
                        <!-- Today line -->
                        <div class="gantt-today-line" style={todayLineStyle} title="Today"></div>
                    </div>
                </div>

                <!-- Work item rows -->
                <template for:each={ganttRows} for:item="row">
                    <div key={row.workItemId} class={row.rowClass} data-id={row.workItemId} ondblclick={handleRowDblClick}>
                        <div class="gantt-label-col" style={row.labelStyle}>
                            <a data-id={row.workItemId} onclick={handleRowClick} class="gantt-work-item-name">
                                {row.name}
                            </a>
                            <template lwc:if={row.descShort}>
                                <div class="gantt-desc-short" title={row.description}>{row.descShort}</div>
                            </template>
                            <div class="gantt-label-meta">
                                <span class={row.stageBadgeClass}>{row.stage}</span>
                            </div>
                            <template lwc:if={row.hasDependencies}>
                                <div class="gantt-dep-badge" title={row.dependencyLabel}>
                                    <lightning-icon icon-name="utility:flow" size="xx-small" alternative-text="Dependencies"></lightning-icon>
                                    <span>{row.dependencyLabel}</span>
                                </div>
                            </template>
                        </div>
                        <div class="gantt-dev-col">
                            <template lwc:if={row.devFirstName}>
                                <span class="gantt-dev-name" title={row.developerName}>{row.devFirstName}</span>
                            </template>
                        </div>
                        <div class="gantt-track-col">
                            <div class="gantt-track">
                                <div
                                    class={row.barClass}
                                    style={row.barStyle}
                                    title={row.barTooltip}
                                    data-id={row.workItemId}
                                    onmousedown={handleBarDragStart}
                                    ontouchstart={handleBarDragStart}
                                ></div>
                            </div>
                        </div>
                    </div>
                </template>

            </div>

            <!-- Legend + drag hint -->
            <div class="gantt-footer">
                <div class="gantt-legend">
                    <span class="legend-item"><span class="legend-dot legend-dot--normal"></span>On track</span>
                    <span class="legend-item"><span class="legend-dot legend-dot--warning"></span>Due &lt; 7 days</span>
                    <span class="legend-item"><span class="legend-dot legend-dot--overdue"></span>Overdue</span>
                    <span class="legend-item"><span class="legend-dot legend-dot--future"></span>Starts after window</span>
                </div>
                <div class="gantt-hint">Click to edit &bull; Double-click to view &bull; Drag bar to reschedule</div>
            </div>
        </template>

    </div>

    <!-- Quick-edit modal -->
    <template lwc:if={showQuickEdit}>
        <c-delivery-gantt-quick-edit
            record-id={selectedWorkItemId}
            onsave={handleQuickEditSave}
            onclose={handleQuickEditClose}
        ></c-delivery-gantt-quick-edit>
    </template>
</template>
