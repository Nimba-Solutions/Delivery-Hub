<template>
    <div class="agenda-card">

        <div class="agenda-header">
            <div class="agenda-header-left">
                <lightning-icon icon-name="standard:metrics" alternative-text="Approval agenda" size="small" class="agenda-header-icon"></lightning-icon>
                <div>
                    <h2 class="agenda-title">Approval Agenda</h2>
                    <p class="agenda-subtitle">Hours approved, pending, and in flight &mdash; click a tile to open its report</p>
                </div>
            </div>
            <div class="agenda-controls">
                <c-delivery-info-popover component-name="deliveryApprovalSummaryCard"></c-delivery-info-popover>
            </div>
        </div>

        <template lwc:if={isLoading}>
            <div class="agenda-loading">
                <lightning-spinner alternative-text="Loading approval summary..." size="small"></lightning-spinner>
            </div>
        </template>

        <template lwc:if={hasError}>
            <div class="agenda-error">
                <lightning-icon icon-name="utility:error" size="x-small"></lightning-icon>
                <span>{errorMessage}</span>
            </div>
        </template>

        <template lwc:if={hasData}>
            <div class="agenda-pitch">
                <span class="pitch-label">Client approved</span>
                <span class="pitch-stat">{approvedShareStat}</span>
            </div>
            <div class="agenda-tiles">
                <template for:each={tiles} for:item="tile">
                    <button key={tile.key}
                            class="agenda-tile"
                            data-report-id={tile.reportId}
                            disabled={tile.hasNoReport}
                            onclick={handleTileClick}>
                        <div class="tile-label">{tile.label}</div>
                        <div class="tile-value">{tile.value}</div>
                        <div class="tile-detail">{tile.detail}</div>
                        <template lwc:if={tile.hasReport}>
                            <div class="tile-link">
                                <lightning-icon icon-name="utility:new_window" size="xx-small"></lightning-icon>
                                <span>Open report</span>
                            </div>
                        </template>
                    </button>
                </template>
            </div>
        </template>

    </div>
</template>
